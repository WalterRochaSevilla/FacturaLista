<div class="auth-container">
    <div class="auth-card card">
        
        <div *ngIf="!isLoading">
        <div class="auth-header">
            <h2 class="brand">FacturaLista</h2>
            <p>Inicia sesión en tu cuenta</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
            <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" class="form-input" formControlName="email" placeholder="tucorreo@empresa.com">
            </div>

            <div class="form-group">
            <label>Contraseña</label>
            <div class="password-wrapper" style="position: relative;">
                <input [type]="showPassword ? 'text' : 'password'" class="form-input" formControlName="password" placeholder="••••••••">
                <button type="button" class="btn-toggle-pass" (click)="togglePassword()" style="position: absolute; right: 10px; top: 12px; background: none; border: none; color: var(--text-muted); cursor: pointer;">
                <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
            </div>
            </div>

            <div class="error-message" *ngIf="loginError" style="color: var(--danger-color); font-size: 0.85rem; margin-bottom: 1rem; text-align: center;">
            Credenciales incorrectas. Verifica tu correo y contraseña.
            </div>

            <button type="submit" class="btn-primary" [disabled]="loginForm.invalid">
            Ingresar
            </button>

            <div class="auth-footer" style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
            ¿No tienes una cuenta? <a routerLink="/register" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Regístrate gratis</a>
            </div>
        </form>
        </div>

        <div *ngIf="isLoading" class="loading-view" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 0;">
        <div class="os-loader"></div>
        <h3 style="margin-top: 2rem; color: var(--text-main);">Iniciando sesión</h3>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Conectando de forma segura...</p>
        </div>

    </div>
</div>
